name: CallQuanta CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Ensure CI env file
        run: |
          if [ ! -f .env ]; then
            cp .env.example .env
          fi
          python - <<'PY'
          from pathlib import Path

          env_path = Path('.env')
          required = {
              'ADMIN_EMAIL': 'admin@example.com',
              'ADMIN_PASSWORD': 'admin-password',
              'SESSION_SECRET': 'ci-session-secret',
              'REQUIRE_AUTH': 'true',
              'APP_ENV': 'test',
          }
          lines = env_path.read_text().splitlines()
          seen = set()
          updated = []
          for line in lines:
              if '=' in line and not line.lstrip().startswith('#'):
                  key = line.split('=', 1)[0].strip()
                  if key in required:
                      if key not in seen:
                          updated.append(f'{key}={required[key]}')
                          seen.add(key)
                      continue
              updated.append(line)
          for key, value in required.items():
              if key not in seen:
                  updated.append(f'{key}={value}')
          env_path.write_text('\n'.join(updated) + '\n')
          PY

      - name: Validate Python syntax
        run: python -m compileall apps/api workers packages

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build web app
        working-directory: apps/web
        run: |
          npm install
          npm run build

      - name: Validate Docker Compose
        run: docker compose config

      - name: Start local stack
        run: |
          docker compose pull postgres redis ollama || docker compose pull postgres redis ollama || true
          docker compose up -d --build

          for i in {1..30}; do
            if docker compose exec -T postgres pg_isready -U "${POSTGRES_USER:-callquanta}" -d "${POSTGRES_DB:-callquanta}" > /dev/null; then
              echo "Postgres is ready"
              exit 0
            fi
            sleep 2
          done

          echo "Postgres readiness check timed out"
          exit 1

      - name: Wait for API health
        run: |
          set -euo pipefail
          for i in {1..30}; do
            if curl -fsS http://localhost:8000/health > /dev/null; then
              echo "API is healthy"
              exit 0
            fi
            sleep 2
          done
          echo "API health check timed out"
          echo "docker compose ps"
          docker compose ps || true
          echo "docker compose logs --no-color api"
          docker compose logs --no-color api || true
          exit 1


      - name: Authenticate smoke tests
        run: |
          set -euo pipefail
          curl -fsS -c /tmp/cookies.txt \
            -H "Content-Type: application/json" \
            -d '{"email":"admin@example.com","password":"admin-password"}' \
            http://localhost:8000/auth/login > /tmp/login.json

          python - <<'PY'
          import json

          data = json.load(open('/tmp/login.json'))
          user = data.get('user', data)
          assert user.get('email') == 'admin@example.com', data
          assert user.get('role') == 'admin', data
          PY

          curl -fsS -b /tmp/cookies.txt http://localhost:8000/auth/me > /tmp/me.json

      - name: Smoke test CORS preflight
        run: |
          set -euo pipefail
          headers=$(mktemp)
          curl -sS -D "$headers" -o /dev/null -X OPTIONS \
            -H "Origin: http://localhost:3000" \
            -H "Access-Control-Request-Method: POST" \
            http://localhost:8000/calls/upload

          grep -qi "access-control-allow-origin: http://localhost:3000" "$headers"

      - name: Smoke test upload/list/get
        run: |
          set -euo pipefail
          diagnostics() {
            echo "/tmp/login.json"
            cat /tmp/login.json || true
            echo "GET /auth/me"
            curl -fsS -b /tmp/cookies.txt http://localhost:8000/auth/me || true
            echo "docker compose logs --no-color api --tail=150"
            docker compose logs --no-color api --tail=150 || true
          }
          trap 'diagnostics' ERR

          printf 'RIFF....WAVEfmt ' > /tmp/sample.wav

          upload_response=$(curl -fsS -b /tmp/cookies.txt -X POST \
            -F "file=@/tmp/sample.wav" \
            http://localhost:8000/calls/upload)
          uploaded_id=$(python -c "import json,sys; print(json.loads(sys.argv[1])['id'])" "$upload_response")

          curl -fsS -b /tmp/cookies.txt http://localhost:8000/calls > /tmp/calls.json
          curl -fsS -b /tmp/cookies.txt http://localhost:8000/calls/${uploaded_id} > /tmp/uploaded-call.json
          UPLOADED_ID="$uploaded_id" python - <<'PY'
          import json
          import os

          data = json.load(open('/tmp/calls.json'))
          uploaded_id = int(os.environ['UPLOADED_ID'])

          if isinstance(data, list):
              calls = data
          else:
              assert isinstance(data, dict), f"Expected list or dict response, got {type(data)}"
              assert 'items' in data, f"Paginated response missing items: {data}"
              assert isinstance(data['items'], list), 'items must be a list'
              assert isinstance(data.get('total'), int), 'total must be an integer'
              assert data['total'] >= 1, 'total must be at least 1'
              assert isinstance(data.get('limit'), int), 'limit must be an integer'
              assert data['limit'] >= 1, 'limit must be at least 1'
              assert data.get('offset') == 0, 'offset must be 0 for the default request'
              calls = data['items']

          assert any(c.get('id') == uploaded_id for c in calls), f"Uploaded call {uploaded_id} not found"
          uploaded_call = json.load(open('/tmp/uploaded-call.json'))
          assert uploaded_call.get('id') == uploaded_id, uploaded_call
          PY


      - name: Smoke test rejects non-audio upload
        run: |
          set -euo pipefail
          printf '\x89PNG\r\n\x1a\n' > /tmp/sample.png

          status=$(curl -sS -b /tmp/cookies.txt -o /tmp/reject.json -w "%{http_code}" -X POST \
            -F "file=@/tmp/sample.png" \
            http://localhost:8000/calls/upload)

          test "$status" = "400"
          python -c "import json; d=json.load(open('/tmp/reject.json')); assert 'Unsupported file extension' in d.get('detail','')"

      - name: Smoke test transcription queue flow
        run: |
          set -euo pipefail
          printf 'RIFF....WAVEfmt ' > /tmp/sample2.wav

          upload_response=$(curl -fsS -b /tmp/cookies.txt -X POST -F "file=@/tmp/sample2.wav" http://localhost:8000/calls/upload)
          call_id=$(python -c "import json,sys; print(json.loads(sys.argv[1])['id'])" "$upload_response")

          curl -fsS -b /tmp/cookies.txt -X POST http://localhost:8000/calls/${call_id}/transcribe

          for i in {1..30}; do
            status=$(curl -fsS -b /tmp/cookies.txt http://localhost:8000/calls/${call_id} | python -c "import json,sys; print(json.load(sys.stdin)['status'])")
            if [ "$status" = "transcribed" ]; then
              break
            fi
            sleep 1
          done

          final_status=$(curl -fsS -b /tmp/cookies.txt http://localhost:8000/calls/${call_id} | python -c "import json,sys; print(json.load(sys.stdin)['status'])")
          if [ "$final_status" != "transcribed" ]; then
            echo "Expected transcribed status, got: $final_status"
            echo "GET /calls/${call_id}"
            curl -fsS -b /tmp/cookies.txt http://localhost:8000/calls/${call_id} || true
            echo "GET /jobs/summary"
            curl -fsS -b /tmp/cookies.txt http://localhost:8000/jobs/summary || true
            echo "docker compose ps"
            docker compose ps || true
            echo "docker compose logs stt-worker"
            docker compose logs --no-color stt-worker || true
            exit 1
          fi

          curl -fsS -b /tmp/cookies.txt http://localhost:8000/calls/${call_id}/transcript | python -c "import json,sys; data=json.load(sys.stdin); assert len(data['segments']) > 0"


      - name: Smoke test placeholder transcript blocks QA
        run: |
          set -euo pipefail
          diagnostics() {
            echo "GET /calls/${call_id:-unknown}"
            if [ -n "${call_id:-}" ]; then curl -fsS -b /tmp/cookies.txt http://localhost:8000/calls/${call_id} || true; fi
            echo "GET /calls/${call_id:-unknown}/qa"
            if [ -n "${call_id:-}" ]; then curl -fsS -b /tmp/cookies.txt http://localhost:8000/calls/${call_id}/qa || true; fi
            echo "GET /calls/${call_id:-unknown}/transcript"
            if [ -n "${call_id:-}" ]; then curl -fsS -b /tmp/cookies.txt http://localhost:8000/calls/${call_id}/transcript || true; fi
            echo "docker compose logs qa-worker"
            docker compose logs --no-color --tail=200 qa-worker || true
          }
          trap 'diagnostics' ERR

          printf 'RIFF....WAVEfmt ' > /tmp/sample3-placeholder.wav
          upload_response=$(curl -fsS -b /tmp/cookies.txt -X POST -F "file=@/tmp/sample3-placeholder.wav" http://localhost:8000/calls/upload)
          call_id=$(python -c "import json,sys; print(json.loads(sys.argv[1])['id'])" "$upload_response")

          curl -fsS -b /tmp/cookies.txt -X POST http://localhost:8000/calls/${call_id}/transcribe
          for i in {1..30}; do
            status=$(curl -fsS -b /tmp/cookies.txt http://localhost:8000/calls/${call_id} | python -c "import json,sys; print(json.load(sys.stdin)['status'])")
            if [ "$status" = "transcribed" ]; then break; fi
            sleep 1
          done

          curl -fsS -b /tmp/cookies.txt -X POST http://localhost:8000/calls/${call_id}/analyze
          for i in {1..30}; do
            status=$(curl -fsS -b /tmp/cookies.txt http://localhost:8000/calls/${call_id} | python -c "import json,sys; print(json.load(sys.stdin)['status'])")
            if [ "$status" = "analysis_blocked_invalid_transcript" ]; then break; fi
            sleep 1
          done

          curl -fsS -b /tmp/cookies.txt http://localhost:8000/calls/${call_id} > /tmp/invalid-call.json
          curl -fsS -b /tmp/cookies.txt http://localhost:8000/calls/${call_id}/qa > /tmp/invalid-qa.json
          python - <<'PY'
          import json

          call = json.load(open('/tmp/invalid-call.json'))
          qa = json.load(open('/tmp/invalid-qa.json'))
          review = qa.get('review') or {}
          validity = review.get('transcript_validity') or {}
          if call.get('status') != 'analysis_blocked_invalid_transcript':
              raise AssertionError(f"Expected analysis_blocked_invalid_transcript, got: {call.get('status')}; call={call}; qa={qa}")
          assert call.get('last_error_type') == 'invalid_transcript', call
          assert review.get('score') is None, review
          assert review.get('qa_invalid_due_to_transcript') is True, review
          assert validity.get('is_valid') is False, validity
          assert 'placeholder_transcript' in (validity.get('flags') or []), validity
          PY

      - name: Smoke test QA analysis with valid transcript
        run: |
          set -euo pipefail
          diagnostics() {
            echo "GET /calls/${call_id:-unknown}"
            if [ -n "${call_id:-}" ]; then curl -fsS -b /tmp/cookies.txt http://localhost:8000/calls/${call_id} || true; fi
            echo "GET /calls/${call_id:-unknown}/qa"
            if [ -n "${call_id:-}" ]; then curl -fsS -b /tmp/cookies.txt http://localhost:8000/calls/${call_id}/qa || true; fi
            echo "GET /calls/${call_id:-unknown}/transcript"
            if [ -n "${call_id:-}" ]; then curl -fsS -b /tmp/cookies.txt http://localhost:8000/calls/${call_id}/transcript || true; fi
            echo "docker compose logs qa-worker"
            docker compose logs --no-color --tail=200 qa-worker || true
          }
          trap 'diagnostics' ERR

          printf 'RIFF....WAVEfmt ' > /tmp/sample3-valid.wav
          upload_response=$(curl -fsS -b /tmp/cookies.txt -X POST -F "file=@/tmp/sample3-valid.wav" http://localhost:8000/calls/upload)
          call_id=$(python -c "import json,sys; print(json.loads(sys.argv[1])['id'])" "$upload_response")

          docker compose exec -T postgres psql -U "${POSTGRES_USER:-callquanta}" -d "${POSTGRES_DB:-callquanta}" -v call_id="$call_id" <<'SQL'
          DELETE FROM transcript_segments WHERE call_id = :call_id;
          INSERT INTO transcript_segments (call_id, speaker, start_ms, end_ms, text) VALUES
            (:call_id, 'agent', 0, 5000, 'Hello, this is CallQuanta support. How can I help you today?'),
            (:call_id, 'customer', 5000, 10000, 'I want to understand why my balance changed.'),
            (:call_id, 'agent', 10000, 18000, 'I checked your account. The balance changed because of the monthly plan charge.'),
            (:call_id, 'customer', 18000, 22000, 'Thank you.'),
            (:call_id, 'agent', 22000, 32000, 'You can also check your balance in the mobile app. Is there anything else I can help with?');
          UPDATE calls SET status = 'transcribed', duration_seconds = 32, last_error_type = NULL, last_error_message = NULL WHERE id = :call_id;
          SQL

          curl -fsS -b /tmp/cookies.txt -X POST http://localhost:8000/calls/${call_id}/analyze
          for i in {1..30}; do
            status=$(curl -fsS -b /tmp/cookies.txt http://localhost:8000/calls/${call_id} | python -c "import json,sys; print(json.load(sys.stdin)['status'])")
            if [ "$status" = "analyzed" ]; then break; fi
            sleep 1
          done

          curl -fsS -b /tmp/cookies.txt http://localhost:8000/calls/${call_id} > /tmp/valid-call.json
          curl -fsS -b /tmp/cookies.txt http://localhost:8000/calls/${call_id}/qa > /tmp/valid-qa.json
          python - <<'PY'
          import json

          call = json.load(open('/tmp/valid-call.json'))
          qa = json.load(open('/tmp/valid-qa.json'))
          review = qa.get('review') or {}
          if call.get('status') != 'analyzed':
              raise AssertionError(f"Expected analyzed status, got: {call.get('status')}; call={call}; qa={qa}")
          assert call.get('last_error_type') != 'invalid_transcript', call
          assert isinstance(review, dict), qa
          assert isinstance(review.get('score'), (int, float)), review
          assert isinstance(review.get('criteria'), list) and review['criteria'], review
          assert isinstance(review.get('summary'), str) and review['summary'], review
          assert review.get('qa_invalid_due_to_transcript') is not True, review
          validity = review.get('transcript_validity')
          assert validity in (None, {}) or validity.get('is_valid') is True, validity
          PY

      - name: Print Docker Compose logs on failure
        if: failure()
        run: |
          if [ ! -f .env ]; then
            cp .env.example .env
          fi
          docker compose logs --no-color

      - name: Shut down containers
        if: always()
        run: |
          if [ ! -f .env ]; then
            cp .env.example .env
          fi
          docker compose down -v
