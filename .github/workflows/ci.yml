name: CallQuanta CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Ensure CI env file
        run: |
          if [ ! -f .env ]; then
            cp .env.example .env
          fi

      - name: Validate Python syntax
        run: python -m compileall apps/api workers packages

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build web app
        working-directory: apps/web
        run: |
          npm install
          npm run build

      - name: Validate Docker Compose
        run: docker compose config

      - name: Start local stack
        run: |
          docker compose up -d --build

          for i in {1..30}; do
            if docker compose exec -T postgres pg_isready -U "${POSTGRES_USER:-callquanta}" -d "${POSTGRES_DB:-callquanta}" > /dev/null; then
              echo "Postgres is ready"
              exit 0
            fi
            sleep 2
          done

          echo "Postgres readiness check timed out"
          exit 1

      - name: Wait for API health
        run: |
          set -euo pipefail
          for i in {1..30}; do
            if curl -fsS http://localhost:8000/health > /dev/null; then
              echo "API is healthy"
              exit 0
            fi
            sleep 2
          done
          echo "API health check timed out"
          echo "docker compose ps"
          docker compose ps || true
          echo "docker compose logs --no-color api"
          docker compose logs --no-color api || true
          exit 1


      - name: Smoke test CORS preflight
        run: |
          set -euo pipefail
          headers=$(mktemp)
          curl -sS -D "$headers" -o /dev/null -X OPTIONS \
            -H "Origin: http://localhost:3000" \
            -H "Access-Control-Request-Method: POST" \
            http://localhost:8000/calls/upload

          grep -qi "access-control-allow-origin: http://localhost:3000" "$headers"

      - name: Smoke test upload/list/get
        run: |
          set -euo pipefail
          printf 'RIFF....WAVEfmt ' > /tmp/sample.wav

          upload_response=$(curl -fsS -X POST \
            -F "file=@/tmp/sample.wav" \
            http://localhost:8000/calls/upload)
          uploaded_id=$(python -c "import json,sys; print(json.loads(sys.argv[1])['id'])" "$upload_response")

          curl -fsS http://localhost:8000/calls > /tmp/calls.json
          UPLOADED_ID="$uploaded_id" python - <<'PY'
          import json
          import os

          data = json.load(open('/tmp/calls.json'))
          uploaded_id = int(os.environ['UPLOADED_ID'])

          if isinstance(data, list):
              calls = data
          else:
              assert isinstance(data, dict), f"Expected list or dict response, got {type(data)}"
              assert 'items' in data, f"Paginated response missing items: {data}"
              assert isinstance(data['items'], list), 'items must be a list'
              assert isinstance(data.get('total'), int), 'total must be an integer'
              assert data['total'] >= 1, 'total must be at least 1'
              assert isinstance(data.get('limit'), int), 'limit must be an integer'
              assert data['limit'] >= 1, 'limit must be at least 1'
              assert data.get('offset') == 0, 'offset must be 0 for the default request'
              calls = data['items']

          assert any(c.get('id') == uploaded_id for c in calls), f"Uploaded call {uploaded_id} not found"
          PY


      - name: Smoke test rejects non-audio upload
        run: |
          set -euo pipefail
          printf '\x89PNG\r\n\x1a\n' > /tmp/sample.png

          status=$(curl -sS -o /tmp/reject.json -w "%{http_code}" -X POST \
            -F "file=@/tmp/sample.png" \
            http://localhost:8000/calls/upload)

          test "$status" = "400"
          python -c "import json; d=json.load(open('/tmp/reject.json')); assert 'Unsupported file extension' in d.get('detail','')"

      - name: Smoke test transcription queue flow
        run: |
          set -euo pipefail
          printf 'RIFF....WAVEfmt ' > /tmp/sample2.wav

          upload_response=$(curl -fsS -X POST -F "file=@/tmp/sample2.wav" http://localhost:8000/calls/upload)
          call_id=$(python -c "import json,sys; print(json.loads(sys.argv[1])['id'])" "$upload_response")

          curl -fsS -X POST http://localhost:8000/calls/${call_id}/transcribe

          for i in {1..30}; do
            status=$(curl -fsS http://localhost:8000/calls/${call_id} | python -c "import json,sys; print(json.load(sys.stdin)['status'])")
            if [ "$status" = "transcribed" ]; then
              break
            fi
            sleep 1
          done

          final_status=$(curl -fsS http://localhost:8000/calls/${call_id} | python -c "import json,sys; print(json.load(sys.stdin)['status'])")
          if [ "$final_status" != "transcribed" ]; then
            echo "Expected transcribed status, got: $final_status"
            echo "GET /calls/${call_id}"
            curl -fsS http://localhost:8000/calls/${call_id} || true
            echo "GET /jobs/summary"
            curl -fsS http://localhost:8000/jobs/summary || true
            echo "docker compose ps"
            docker compose ps || true
            echo "docker compose logs stt-worker"
            docker compose logs --no-color stt-worker || true
            exit 1
          fi

          curl -fsS http://localhost:8000/calls/${call_id}/transcript | python -c "import json,sys; data=json.load(sys.stdin); assert len(data['segments']) > 0"


      - name: Smoke test QA analysis flow
        run: |
          set -euo pipefail
          printf 'RIFF....WAVEfmt ' > /tmp/sample3.wav

          upload_response=$(curl -fsS -X POST -F "file=@/tmp/sample3.wav" http://localhost:8000/calls/upload)
          call_id=$(python -c "import json,sys; print(json.loads(sys.argv[1])['id'])" "$upload_response")

          curl -fsS -X POST http://localhost:8000/calls/${call_id}/transcribe

          for i in {1..30}; do
            status=$(curl -fsS http://localhost:8000/calls/${call_id} | python -c "import json,sys; print(json.load(sys.stdin)['status'])")
            if [ "$status" = "transcribed" ]; then
              break
            fi
            sleep 1
          done

          curl -fsS -X POST http://localhost:8000/calls/${call_id}/analyze

          for i in {1..30}; do
            status=$(curl -fsS http://localhost:8000/calls/${call_id} | python -c "import json,sys; print(json.load(sys.stdin)['status'])")
            if [ "$status" = "analyzed" ]; then
              break
            fi
            sleep 1
          done

          final_status=$(curl -fsS http://localhost:8000/calls/${call_id} | python -c "import json,sys; print(json.load(sys.stdin)['status'])")
          if [ "$final_status" != "analyzed" ]; then
            echo "Expected analyzed status, got: $final_status"
            echo "GET /calls/${call_id}"
            curl -fsS http://localhost:8000/calls/${call_id} || true
            echo "GET /calls/${call_id}/qa"
            curl -fsS http://localhost:8000/calls/${call_id}/qa || true
            echo "docker compose logs qa-worker"
            docker compose logs --no-color qa-worker || true
            exit 1
          fi

          curl -fsS http://localhost:8000/calls/${call_id}/qa | python -c "import json,sys; d=json.load(sys.stdin); r=d['review']; assert isinstance(r, dict); assert isinstance(r['score'], (int,float)); assert isinstance(r['summary'], str) and r['summary']; assert isinstance(r['findings'], list)"

      - name: Print Docker Compose logs on failure
        if: failure()
        run: |
          if [ ! -f .env ]; then
            cp .env.example .env
          fi
          docker compose logs --no-color

      - name: Shut down containers
        if: always()
        run: |
          if [ ! -f .env ]; then
            cp .env.example .env
          fi
          docker compose down -v
