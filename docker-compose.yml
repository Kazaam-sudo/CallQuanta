version: '3.9'
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  api:
    build: ./apps/api
    env_file: .env.example
    depends_on:
      - postgres
      - redis
      - ollama
    ports:
      - "${API_PORT:-8000}:8000"

  web:
    build: ./apps/web
    depends_on:
      - api
    ports:
      - "${WEB_PORT:-3000}:3000"

  stt-worker:
    build: ./workers/stt-worker
    env_file: .env.example
    depends_on:
      - redis
      - api

  qa-worker:
    build: ./workers/qa-worker
    env_file: .env.example
    depends_on:
      - redis
      - api

volumes:
  postgres_data:
  ollama_data:
