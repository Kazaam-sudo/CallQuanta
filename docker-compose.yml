services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-callquanta}
      POSTGRES_USER: ${POSTGRES_USER:-callquanta}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-callquanta}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\" -h localhost"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      ollama:
        condition: service_started
    restart: on-failure
    ports:
      - "${API_PORT:-8000}:8000"
    environment:
      UPLOAD_DIR: /app/uploads
    volumes:
      - api_uploads:/app/uploads

  web:
    build: ./apps/web
    depends_on:
      - api
    environment:
      INTERNAL_API_URL: ${INTERNAL_API_URL:-http://api:8000}
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-}
    ports:
      - "${WEB_PORT:-3000}:3000"

  stt-worker:
    build: ./workers/stt-worker
    env_file: .env
    depends_on:
      - redis
      - api
    volumes:
      - api_uploads:/app/uploads:ro

  qa-worker:
    build:
      context: .
      dockerfile: workers/qa-worker/Dockerfile
    env_file: .env
    depends_on:
      - redis
      - api

volumes:
  postgres_data:
  ollama_data:
  api_uploads:
