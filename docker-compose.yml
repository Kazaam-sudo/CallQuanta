services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-callquanta}
      POSTGRES_USER: ${POSTGRES_USER:-callquanta}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-callquanta}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  api:
    build: ./apps/api
    env_file: .env
    depends_on:
      - postgres
      - redis
      - ollama
    ports:
      - "${API_PORT:-8000}:8000"
    environment:
      UPLOAD_DIR: /app/uploads
    volumes:
      - api_uploads:/app/uploads

  web:
    build: ./apps/web
    depends_on:
      - api
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
    ports:
      - "${WEB_PORT:-3000}:3000"

  stt-worker:
    build: ./workers/stt-worker
    env_file: .env
    depends_on:
      - redis
      - api

  qa-worker:
    build: ./workers/qa-worker
    env_file: .env
    depends_on:
      - redis
      - api

volumes:
  postgres_data:
  ollama_data:
