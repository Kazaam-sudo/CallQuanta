services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-callquanta}
      POSTGRES_USER: ${POSTGRES_USER:-callquanta}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-callquanta}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\" -h localhost"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes", "--appendfsync", "everysec"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data

  ollama:
    image: ollama/ollama:latest
    ports:
      - "127.0.0.1:11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ollama:
        condition: service_started
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=2).read()"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s
    restart: on-failure
    ports:
      - "127.0.0.1:${API_PORT:-8000}:8000"
    environment:
      UPLOAD_DIR: /app/uploads
      APP_ENV: ${APP_ENV:-development}
      REQUIRE_AUTH: ${REQUIRE_AUTH:-true}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      SESSION_SECRET: ${SESSION_SECRET:-dev-session-secret-change-me}
      WORKER_HEARTBEAT_SECONDS: ${WORKER_HEARTBEAT_SECONDS:-30}
    volumes:
      - api_uploads:/app/uploads

  web:
    build: ./apps/web
    depends_on:
      - api
    environment:
      API_INTERNAL_BASE_URL: ${API_INTERNAL_BASE_URL:-http://api:8000}
      INTERNAL_API_URL: ${INTERNAL_API_URL:-http://api:8000}
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-}
      SESSION_COOKIE_NAME: ${SESSION_COOKIE_NAME:-callquanta_session}
    ports:
      - "127.0.0.1:${WEB_PORT:-3000}:3000"

  stt-worker:
    build:
      context: .
      dockerfile: workers/stt-worker/Dockerfile
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
      api:
        condition: service_healthy
    restart: on-failure
    environment:
      WORKER_HEARTBEAT_SECONDS: ${WORKER_HEARTBEAT_SECONDS:-30}
    volumes:
      - api_uploads:/app/uploads:ro

  recording-worker:
    build: ./workers/recording-worker
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
      api:
        condition: service_healthy
    restart: on-failure
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://callquanta:callquanta@postgres:5432/callquanta}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      UPLOAD_DIR: /app/uploads
      RECORDING_DOWNLOAD_MAX_BYTES: ${RECORDING_DOWNLOAD_MAX_BYTES:-104857600}
      RECORDING_DOWNLOAD_TIMEOUT_SECONDS: ${RECORDING_DOWNLOAD_TIMEOUT_SECONDS:-120}
      RECORDING_DOWNLOAD_CONNECT_TIMEOUT_SECONDS: ${RECORDING_DOWNLOAD_CONNECT_TIMEOUT_SECONDS:-10}
      RECORDING_DOWNLOAD_MAX_REDIRECTS: ${RECORDING_DOWNLOAD_MAX_REDIRECTS:-5}
      RECORDING_DOWNLOAD_ALLOW_PRIVATE_HOSTS: ${RECORDING_DOWNLOAD_ALLOW_PRIVATE_HOSTS:-false}
      RECORDING_DOWNLOAD_ALLOWED_HOSTS: ${RECORDING_DOWNLOAD_ALLOWED_HOSTS:-}
      WORKER_HEARTBEAT_SECONDS: ${WORKER_HEARTBEAT_SECONDS:-30}
    volumes:
      - api_uploads:/app/uploads

  qa-worker:
    build:
      context: .
      dockerfile: workers/qa-worker/Dockerfile
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
      api:
        condition: service_healthy
    restart: on-failure
    environment:
      WORKER_HEARTBEAT_SECONDS: ${WORKER_HEARTBEAT_SECONDS:-30}

volumes:
  postgres_data:
  redis_data:
  ollama_data:
  api_uploads:
